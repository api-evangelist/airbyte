naftiko: 1.0.0-alpha2
info:
  label: airbyte-api — OAuth
  description: 'airbyte-api — OAuth. 1 operations. Lead operation: Airbyte Receive OAuth Callbacks. Self-contained Naftiko
    capability covering one Airbyte business surface.'
  tags:
  - Airbyte
  - OAuth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AIRBYTE_API_KEY: AIRBYTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: airbyte-oauth
    baseUri: https://api.airbyte.com/v1
    description: airbyte-api — OAuth business capability. Self-contained, no shared references.
    resources:
    - name: oauth-callback
      path: /oauth/callback
      operations:
      - name: oauthcallback
        method: GET
        description: Airbyte Receive OAuth Callbacks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryParams
          in: query
          type: object
          description: Query parameters. Should contain state and code.
  exposes:
  - type: rest
    namespace: airbyte-oauth-rest
    port: 8080
    description: REST adapter for airbyte-api — OAuth. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/oauth/callback
      name: oauth-callback
      description: REST surface for oauth-callback.
      operations:
      - method: GET
        name: oauthcallback
        description: Airbyte Receive OAuth Callbacks
        call: airbyte-oauth.oauthcallback
        with:
          queryParams: rest.queryParams
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: airbyte-oauth-mcp
    port: 9090
    transport: http
    description: MCP adapter for airbyte-api — OAuth. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: airbyte-receive-oauth-callbacks
      description: Airbyte Receive OAuth Callbacks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: airbyte-oauth.oauthcallback
      with:
        queryParams: tools.queryParams
      outputParameters:
      - type: object
        mapping: $.
