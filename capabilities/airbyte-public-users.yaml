naftiko: 1.0.0-alpha2
info:
  label: airbyte-api — public_users
  description: 'airbyte-api — public_users. 1 operations. Lead operation: Airbyte List All Users Within an Organization. Self-contained
    Naftiko capability covering one Airbyte business surface.'
  tags:
  - Airbyte
  - public_users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AIRBYTE_API_KEY: AIRBYTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: airbyte-public-users
    baseUri: https://api.airbyte.com/v1
    description: airbyte-api — public_users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listuserswithinanorganization
        method: GET
        description: Airbyte List All Users Within an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: query
          type: string
          required: true
        - name: ids
          in: query
          type: array
          description: List of user IDs to filter by
        - name: emails
          in: query
          type: array
          description: List of user emails to filter by
  exposes:
  - type: rest
    namespace: airbyte-public-users-rest
    port: 8080
    description: REST adapter for airbyte-api — public_users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listuserswithinanorganization
        description: Airbyte List All Users Within an Organization
        call: airbyte-public-users.listuserswithinanorganization
        with:
          organizationId: rest.organizationId
          ids: rest.ids
          emails: rest.emails
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: airbyte-public-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for airbyte-api — public_users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: airbyte-list-all-users-within
      description: Airbyte List All Users Within an Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: airbyte-public-users.listuserswithinanorganization
      with:
        organizationId: tools.organizationId
        ids: tools.ids
        emails: tools.emails
      outputParameters:
      - type: object
        mapping: $.
