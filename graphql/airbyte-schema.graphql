# ------------------------------------------------------------------
# Root Query
# ------------------------------------------------------------------

type Query {
  # Workspaces
  workspace(workspaceId: UUID!): Workspace
  workspaces(organizationId: UUID, limit: Int, offset: Int): WorkspacesPage!

  # Organizations
  organization(organizationId: UUID!): Organization

  # Users
  user(userId: UUID!): User
  users(workspaceId: UUID, organizationId: UUID): UsersPage!

  # Permissions
  permissions(userId: UUID, workspaceId: UUID, organizationId: UUID): PermissionsPage!

  # Sources
  source(sourceId: UUID!): Source
  sources(workspaceId: UUID!, limit: Int, offset: Int, includeDeleted: Boolean): SourcesPage!
  sourceDefinitions(workspaceId: UUID): ConnectorDefinitionsPage!
  streamProperties(sourceId: UUID!, destinationId: UUID, workspaceId: UUID): [StreamProperties!]!

  # Destinations
  destination(destinationId: UUID!): Destination
  destinations(workspaceId: UUID!, limit: Int, offset: Int, includeDeleted: Boolean): DestinationsPage!
  destinationDefinitions(workspaceId: UUID): ConnectorDefinitionsPage!

  # Connections
  connection(connectionId: UUID!): Connection
  connections(workspaceId: UUID!, sourceId: UUID, destinationId: UUID, limit: Int, offset: Int, includeDeleted: Boolean): ConnectionsPage!

  # Jobs
  job(jobId: UUID!): Job
  jobs(connectionId: UUID!, jobType: JobType, limit: Int, offset: Int): JobsPage!

  # Tags
  tags(workspaceId: UUID!): TagsPage!

  # Applications
  applications: [Application!]!

  # Dataplanes
  dataplanes(regionId: UUID): [Dataplane!]!
  regions: [Region!]!
}

# ------------------------------------------------------------------
# Root Mutation
# ------------------------------------------------------------------

type Mutation {
  # Workspaces
  createWorkspace(input: CreateWorkspaceInput!): Workspace!
  updateWorkspace(workspaceId: UUID!, input: UpdateWorkspaceInput!): Workspace!
  deleteWorkspace(workspaceId: UUID!): Boolean!

  # Sources
  createSource(input: CreateSourceInput!): Source!
  updateSource(sourceId: UUID!, input: UpdateSourceInput!): Source!
  deleteSource(sourceId: UUID!): Boolean!

  # Destinations
  createDestination(input: CreateDestinationInput!): Destination!
  updateDestination(destinationId: UUID!, input: UpdateDestinationInput!): Destination!
  deleteDestination(destinationId: UUID!): Boolean!

  # Connections
  createConnection(input: CreateConnectionInput!): Connection!
  updateConnection(connectionId: UUID!, input: UpdateConnectionInput!): Connection!
  deleteConnection(connectionId: UUID!): Boolean!

  # Jobs
  createJob(input: CreateJobInput!): Job!
  cancelJob(jobId: UUID!): Job!

  # Tags
  createTag(input: CreateTagInput!): Tag!
  updateTag(tagId: UUID!, name: String, color: String): Tag!
  deleteTag(tagId: UUID!): Boolean!

  # Applications
  createApplication(input: CreateApplicationInput!): Application!
  deleteApplication(applicationId: UUID!): Boolean!

  # Permissions
  createPermission(userId: UUID!, permissionType: PermissionType!, workspaceId: UUID, organizationId: UUID): Permission!
  updatePermission(permissionId: UUID!, permissionType: PermissionType!): Permission!
  deletePermission(permissionId: UUID!): Boolean!
}
