# Airbyte GraphQL Schema
# Derived from the Airbyte public API OpenAPI specification (airbyte-platform/airbyte-api)
# Source: https://github.com/airbytehq/airbyte-platform/tree/main/airbyte-api/server-api/src/main/openapi
# The /graphql endpoint exists at https://api.airbyte.com/graphql (requires authentication)

# ------------------------------------------------------------------
# Scalars
# ------------------------------------------------------------------

scalar DateTime
scalar JSON
scalar UUID

# ------------------------------------------------------------------
# Enums
# ------------------------------------------------------------------

enum ConnectorType {
  source
  destination
}

enum ConnectionStatus {
  active
  inactive
  deprecated
  locked
}

enum ConnectionSyncMode {
  full_refresh_overwrite
  full_refresh_overwrite_deduped
  full_refresh_append
  full_refresh_update
  full_refresh_soft_delete
  incremental_append
  incremental_deduped_history
  incremental_update
  incremental_soft_delete
}

enum ScheduleType {
  manual
  cron
  basic
}

enum JobStatus {
  pending
  running
  incomplete
  failed
  succeeded
  cancelled
  running_activity
}

enum JobType {
  sync
  reset_connection
  refresh
  clear
}

enum UserStatus {
  invited
  registered
  disabled
}

enum PermissionType {
  instance_admin
  organization_admin
  organization_editor
  organization_reader
  organization_member
  workspace_admin
  workspace_editor
  workspace_reader
}

enum PermissionScope {
  workspace
  organization
  instance
}

enum NamespaceDefinition {
  source
  destination
  custom_format
}

enum NonBreakingSchemaUpdatesBehavior {
  ignore
  disable_connection
  propagate_columns
  propagate_fully
}

enum AuthProvider {
  airbyte
  google_identity_platform
  keycloak
}

enum StreamMapperType {
  hashing
  field_renaming
  row_filtering
  encryption
  field_filtering
}

enum EncryptionMapperAlgorithm {
  AES_CBC
  RSA
}

enum RowFilteringOperationType {
  EQUAL
  NOT
}

enum SSOConfigStatus {
  enabled
  disabled
  pending
}

# ------------------------------------------------------------------
# Core Domain Types
# ------------------------------------------------------------------

type Workspace {
  workspaceId: UUID!
  name: String!
  dataResidency: String
  notifications: NotificationsConfig
  organizationId: UUID
  createdAt: DateTime
  updatedAt: DateTime
}

type Organization {
  organizationId: UUID!
  name: String!
  email: String
  ssoConfigStatus: SSOConfigStatus
  createdAt: DateTime
  updatedAt: DateTime
}

type User {
  id: UUID!
  name: String!
  email: String!
  status: UserStatus!
  authProvider: AuthProvider
  createdAt: DateTime
  updatedAt: DateTime
}

type Permission {
  permissionId: UUID!
  permissionType: PermissionType!
  scope: PermissionScope!
  userId: UUID!
  workspaceId: UUID
  organizationId: UUID
  createdAt: DateTime
}

# ------------------------------------------------------------------
# Source & Destination Types
# ------------------------------------------------------------------

type Source {
  sourceId: UUID!
  name: String!
  sourceType: String!
  definitionId: UUID!
  workspaceId: UUID!
  configuration: JSON
  createdAt: DateTime
  updatedAt: DateTime
  resourceAllocation: ScopedResourceRequirements
  workspace: Workspace
  connections: [Connection!]
}

type Destination {
  destinationId: UUID!
  name: String!
  destinationType: String!
  definitionId: UUID
  workspaceId: UUID!
  configuration: JSON
  createdAt: DateTime
  updatedAt: DateTime
  resourceAllocation: ScopedResourceRequirements
  workspace: Workspace
  connections: [Connection!]
}

type SourceDefinition {
  sourceDefinitionId: UUID!
  name: String!
  dockerRepository: String!
  dockerImageTag: String!
  documentationUrl: String
  icon: String
  connectorType: ConnectorType
  releaseStage: String
  supportLevel: String
  createdAt: DateTime
  updatedAt: DateTime
}

type DestinationDefinition {
  destinationDefinitionId: UUID!
  name: String!
  dockerRepository: String!
  dockerImageTag: String!
  documentationUrl: String
  icon: String
  connectorType: ConnectorType
  releaseStage: String
  supportLevel: String
  createdAt: DateTime
  updatedAt: DateTime
}

type ConnectorDefinition {
  id: UUID!
  name: String!
  connectorDefinitionType: ConnectorType!
  version: String!
  documentationUrl: String
  icon: String
}

# ------------------------------------------------------------------
# Connection Types
# ------------------------------------------------------------------

type Connection {
  connectionId: UUID!
  name: String!
  sourceId: UUID!
  destinationId: UUID!
  workspaceId: UUID!
  status: ConnectionStatus!
  schedule: ConnectionSchedule
  nonBreakingSchemaUpdatesBehavior: NonBreakingSchemaUpdatesBehavior
  namespaceDefinition: NamespaceDefinition
  namespaceFormat: String
  prefix: String
  configurations: StreamConfigurations
  tags: [Tag!]
  statusReason: String
  createdAt: DateTime
  updatedAt: DateTime
  source: Source
  destination: Destination
  workspace: Workspace
  jobs(limit: Int, offset: Int): [Job!]
  latestSyncJob: Job
}

type ConnectionSchedule {
  scheduleType: ScheduleType!
  cronExpression: String
  basicTiming: String
}

type StreamConfigurations {
  streams: [StreamConfiguration!]!
}

type StreamConfiguration {
  name: String!
  namespace: String
  syncMode: ConnectionSyncMode!
  cursorField: [String!]
  primaryKey: [[String!]!]
  includeFiles: Boolean
  destinationObjectName: String
  selectedFields: [SelectedFieldInfo!]
  mappers: [ConfiguredStreamMapper!]
}

type StreamProperties {
  streamName: String!
  streamNamespace: String
  syncModes: [ConnectionSyncMode!]!
  defaultCursorField: [String!]
  sourceDefinedCursorField: Boolean
  sourceDefinedPrimaryKey: [[String!]!]
  propertyFields: [[String!]!]
}

type SelectedFieldInfo {
  fieldPath: [String!]
  selected: Boolean
}

type ConfiguredStreamMapper {
  id: UUID
  type: StreamMapperType!
  mapperConfiguration: JSON
}

# ------------------------------------------------------------------
# Catalog Types
# ------------------------------------------------------------------

type AirbyteCatalog {
  streams: [AirbyteStreamAndConfig!]!
}

type AirbyteStream {
  name: String!
  namespace: String
  jsonSchema: JSON
  supportedSyncModes: [ConnectionSyncMode!]
  sourceDefinedCursor: Boolean
  defaultCursorField: [String!]
  sourceDefinedPrimaryKey: [[String!]!]
}

type AirbyteStreamAndConfig {
  stream: AirbyteStream!
  config: AirbyteStreamConfig!
}

type AirbyteStreamConfig {
  syncMode: ConnectionSyncMode!
  destinationSyncMode: ConnectionSyncMode
  cursorField: [String!]
  primaryKey: [[String!]!]
  aliasName: String
  selected: Boolean
  fieldSelectionEnabled: Boolean
  selectedFields: [SelectedFieldInfo!]
}

type ConfiguredCatalog {
  streams: [AirbyteStreamAndConfig!]!
}

